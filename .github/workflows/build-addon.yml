name: build-addon

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

jobs:
  napi-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build napi addon
        run: pnpm native:build:release

      - name: Run native integration acceptance
        run: pnpm vitest run tests/native-napi-integration.test.ts
        env:
          AA_NATIVE_TEST: "1"

      - name: Upload prebuilt artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent_assembly-${{ matrix.os }}-node${{ matrix.node-version }}
          path: native/aa-ffi-node/index.node
